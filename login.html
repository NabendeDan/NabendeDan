<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Dan4Christ</title>
  <!-- Bootstrap 5 CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <!-- Font Awesome for Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  
  <style>
    :root {
      --primary-color: #4e73df;
      --primary-hover: #2e59d9;
      --secondary-color: #858796;
      --bg-gradient-start: #4e73df;
      --bg-gradient-end: #224abe;
    }

    body {
      background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 15px;
    }

    .login-container {
      width: 100%;
      max-width: 420px;
    }

    .card {
      border: none;
      border-radius: 15px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
      overflow: hidden;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25);
    }

    .card-header {
      background: #f8f9fc;
      border-bottom: 1px solid #e3e6f0;
      text-align: center;
      padding: 30px 20px;
    }

    .card-header h2 {
      margin: 10px 0 5px;
      color: var(--primary-color);
      font-weight: 700;
      font-size: 1.8rem;
    }

    .card-header .logo-icon {
      font-size: 3rem;
      color: var(--primary-color);
    }

    .card-body {
      padding: 35px;
    }

    /* Input Group Styling */
    .input-group {
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
      border-radius: 8px;
      overflow: hidden;
      transition: all 0.3s ease;
    }

    .input-group:focus-within {
      box-shadow: 0 0 0 0.2rem rgba(78, 115, 223, 0.25);
    }

    .input-group-text {
      background-color: #f8f9fc;
      border: 1px solid #ced4da;
      border-right: none;
      color: var(--secondary-color);
    }

    .form-control {
      border-left: none;
      padding: 12px 15px;
      height: auto;
      border: 1px solid #ced4da;
    }

    .form-control:focus {
      box-shadow: none;
      border-color: #ced4da;
    }

    /* Password Toggle */
    .password-toggle {
      cursor: pointer;
      background: #f8f9fc;
      border: 1px solid #ced4da;
      border-left: none;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 15px;
      color: var(--secondary-color);
      transition: color 0.2s;
    }

    .password-toggle:hover {
      color: var(--primary-color);
    }

    /* Button Styling */
    .btn-primary {
      background-color: var(--primary-color);
      border-color: var(--primary-color);
      padding: 12px;
      font-weight: 600;
      letter-spacing: 0.5px;
      border-radius: 8px;
      transition: all 0.3s ease;
    }

    .btn-primary:hover {
      background-color: var(--primary-hover);
      border-color: var(--primary-hover);
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
    }

    .btn-primary:disabled {
      background-color: #a0aec0;
      border-color: #a0aec0;
      transform: none;
      box-shadow: none;
    }

    /* Links & Alerts */
    .forgot-link {
      display: block;
      margin-top: 20px;
      text-align: center;
      color: var(--secondary-color);
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.2s;
    }

    .forgot-link:hover {
      color: var(--primary-color);
    }

    .alert {
      border-radius: 8px;
      font-size: 0.9rem;
      padding: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      border: none;
      animation: slideDown 0.3s ease;
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .spinner-border-sm {
      width: 1rem;
      height: 1rem;
      border-width: 0.2em;
    }

    @media (max-width: 576px) {
      .card-body { padding: 25px; }
      .card-header h2 { font-size: 1.5rem; }
    }
  </style>
</head>

<body>
  <div class="login-container">
    <div class="card">
      <div class="card-header">
        <div class="logo-icon">
          <i class="fas fa-user-circle"></i>
        </div>
        <h2>Welcome Back!</h2>
        <p class="text-muted mb-0">Please sign in to your account</p>
      </div>
      <div class="card-body">
        <!-- Alert Box -->
        <div id="alertBox" class="alert d-none" role="alert">
          <i class="fas fa-info-circle"></i>
          <span id="alertMessage"></span>
        </div>
        
        <!-- Login Form -->
        <form id="loginForm" autocomplete="off">
          <div class="mb-3">
            <label for="username" class="form-label visually-hidden">Username</label>
            <div class="input-group">
              <span class="input-group-text"><i class="fas fa-user"></i></span>
              <input type="text" name="username" id="username" class="form-control" placeholder="Username or Email" required>
            </div>
          </div>
          
          <div class="mb-4">
            <label for="password" class="form-label visually-hidden">Password</label>
            <div class="input-group">
              <span class="input-group-text"><i class="fas fa-lock"></i></span>
              <input type="password" name="password" id="password" class="form-control" placeholder="Password" required>
              <span class="input-group-text password-toggle" id="togglePassword">
                <i class="fas fa-eye"></i>
              </span>
            </div>
          </div>
          
          <button type="submit" class="btn btn-primary w-100" id="submitBtn">
            <span class="btn-text">Sign In</span>
            <span class="btn-loader d-none">
              <span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
              Authenticating...
            </span>
          </button>
        </form>

        <a href="forgot_password.php" class="forgot-link">
          <i class="fas fa-question-circle me-1"></i> Forgot your password?
        </a>
      </div>
    </div>
  </div>

  <script>
    $(document).ready(function() {
      // 1. Toggle Password Visibility
      $('#togglePassword').on('click', function() {
        const passwordField = $('#password');
        const type = passwordField.attr('type') === 'password' ? 'text' : 'password';
        passwordField.attr('type', type);
        
        // Toggle the eye icon
        const icon = $(this).find('i');
        icon.toggleClass('fa-eye fa-eye-slash');
      });

      // 2. Handle Form Submission via AJAX
      $("#loginForm").on("submit", function(e) {
        e.preventDefault();
        
        const submitBtn = $('#submitBtn');
        const btnText = submitBtn.find('.btn-text');
        const btnLoader = submitBtn.find('.btn-loader');

        // Show loader and disable button to prevent double-clicks
        submitBtn.prop('disabled', true);
        btnText.addClass('d-none');
        btnLoader.removeClass('d-none');

        $.ajax({
          url: "login.php",
          type: "POST",
          data: {
            username: $("#username").val().trim(),
            password: $("#password").val()
          },
          success: function(response) {
            // Trim whitespace to prevent matching errors
            const res = response.trim();

            if (res.includes("Director")) {
              showAlert("Login successful! Redirecting to Director Dashboard...", "success");
              setTimeout(() => { window.location.href = "director.php"; }, 1000);
            } 
            else if (res.includes("Headteacher") || res.includes("Head")) {
              showAlert("Login successful! Redirecting to Headteacher Dashboard...", "success");
              setTimeout(() => { window.location.href = "headteacher.php"; }, 1000);
            } 
            else if (res.includes("Staff")) {
              showAlert("Login successful! Redirecting to Staff Dashboard...", "success");
              setTimeout(() => { window.location.href = "staff.php"; }, 1000);
            } 
            else if (res.includes("Student")) {
              showAlert("Login successful! Redirecting to Student Portal...", "success");
              setTimeout(() => { window.location.href = "student.php"; }, 1000);
            } 
            else {
              showAlert("Invalid username or password. Please try again.", "danger");
            }
          },
          error: function(xhr, status, error) {
            showAlert("A server error occurred. Please check your connection.", "danger");
            console.error("AJAX Error:", error);
          },
          complete: function() {
            // Re-enable button and hide loader regardless of success/failure
            submitBtn.prop('disabled', false);
            btnText.removeClass('d-none');
            btnLoader.addClass('d-none');
          }
        });
      });

      // 3. Helper function to show alerts
      function showAlert(message, type) {
        const alertBox = $('#alertBox');
        const alertMessage = $('#alertMessage');
        const icon = alertBox.find('i');

        alertMessage.text(message);
        alertBox.removeClass('d-none alert-success alert-danger alert-info')
                .addClass('alert-' + type);
        
        if (type === 'success') {
          icon.removeClass('fa-info-circle fa-exclamation-circle').addClass('fa-check-circle');
        } else {
          icon.removeClass('fa-info-circle fa-check-circle').addClass('fa-exclamation-circle');
        }
      }
    });
  </script>
</body>
</html>
